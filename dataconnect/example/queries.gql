query AllEvents @auth(level: PUBLIC, insecureReason: "This operation is safe to expose to the public") {
  events {
    id
    title
    description
    date
    time
    location
    imageUrl
    category
    status
    organizer {
      id
      displayName
      email
    }
  }
}

query MyPurchases @auth(level: USER, insecureReason: "This operation is safe to expose to all logged in users.") {
  purchases(where: {purchaser: {id_expr: "auth.uid"}}) {
    id
    purchaseDate
    totalAmount
    paymentStatus
    transactionId
    purchaser {
      id
      displayName
    }
  }
}

mutation CreateEvent($title: String!, $description: String!, $date: Date!, $time: String!, $location: String!, $category: String!, $status: String!, $imageUrl: String) @auth(level: USER) {
  event_insert(data: {
    title: $title,
    description: $description,
    date: $date,
    time: $time,
    location: $location,
    imageUrl: $imageUrl,
    category: $category,
    status: $status,
    organizerId_expr: "auth.uid",
    createdAt_expr: "request.time"
  }) {
    id
  }
}

mutation RegisterForEvent($eventId: UUID!, $ticketTypeId: UUID!, $pricePaid: Float!) @auth(level: USER) {
  ticket_insert(data: {
    eventId: $eventId,
    ticketTypeId: $ticketTypeId,
    attendeeId_expr: "auth.uid",
    purchaseDate_expr: "request.time",
    ticketCode_expr: "uuidV4()",
    pricePaid: $pricePaid,
    status: "Confirmed",
    createdAt_expr: "request.time"
  }) {
    id
  }
}